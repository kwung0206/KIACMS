spring:
  datasource:
    url: jdbc:h2:mem:kiacms;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  jackson:
    time-zone: UTC

app:
  security:
    jwt:
      secret: test-secret-key-for-jwt-signing-1234567890
      issuer: test
      access-token-validity-seconds: 3600
    cors:
      allowed-origins:
        - http://localhost:5173
  bootstrap:
    root:
      enabled: false
